<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono&display=swap" rel="stylesheet">
  {% seo %}
  <style>
    body { font-family: 'Inter', sans-serif; margin: 0; padding: 0; background-color: #f8fafc; color: #1e293b; }
    .full-width-header { width: 100%; background: #0f172a !important; border-bottom: 4px solid #3b82f6; }
    .nav-link { color: #cbd5e1; text-decoration: none; font-weight: 500; font-size: 0.85rem; padding: 0.5rem 1rem; border-radius: 0.375rem; transition: all 0.2s ease; border: 1px solid transparent; }
    .nav-link:hover { color: white; background: rgba(255, 255, 255, 0.05); border-color: rgba(255, 255, 255, 0.1); }
    .markdown-content { line-height: 1.7; color: #334155; }
    .markdown-content h1, .markdown-content h2, .markdown-content h3 { color: #0f172a; font-weight: 700; margin-top: 2.5rem; margin-bottom: 1.25rem; letter-spacing: -0.025em; }
    .markdown-content h2 { font-size: 1.75rem; border-bottom: 2px solid #e2e8f0; padding-bottom: 0.5rem; }
    .markdown-content p { margin-bottom: 1.5rem; }
    .markdown-content ul { margin-bottom: 1.5rem; padding-left: 1.5rem; list-style-type: disc !important; }
    .markdown-content ol { margin-bottom: 1.5rem; padding-left: 1.5rem; list-style-type: decimal !important; }
    .markdown-content li { margin-bottom: 0.65rem; }
    .markdown-content li::marker { color: #3b82f6; }
    .markdown-content a { color: #2563eb; text-decoration: underline; text-underline-offset: 4px; font-weight: 500; }
    .markdown-content a:hover { color: #1d4ed8; }
    .markdown-content code { font-family: 'JetBrains Mono', monospace; background-color: #f1f5f9; color: #0f172a; padding: 0.2rem 0.4rem; border-radius: 0.375rem; font-size: 0.875em; }
    .markdown-content pre { font-family: 'JetBrains Mono', monospace; background-color: #f6f8fa; color: #111827; padding: 1.5rem; border-radius: 0.75rem; overflow-x: auto; margin: 2rem 0; border: 1px solid #d0d7de; }
    .highlight .k, .highlight .kd, .highlight .kn, .highlight .kp, .highlight .kr, .highlight .kt { color: #d73a49; font-weight: bold; }
    .highlight .s, .highlight .s1, .highlight .s2 { color: #032f62; }
    .highlight .c, .highlight .c1 { color: #6a737d; font-style: italic; }
    .highlight .nf { color: #6f42c1; font-weight: bold; }
    /* Tables Styling */
    .markdown-content table { width: 100%; margin: 2rem 0; border-collapse: collapse; font-size: 0.9rem; border: 1px solid #e2e8f0; border-radius: 0.5rem; overflow: hidden; }
    .markdown-content th { background-color: #f8fafc; color: #0f172a; font-weight: 700; padding: 0.75rem 1rem; border-bottom: 2px solid #e2e8f0; text-align: left; }
    .markdown-content td { padding: 0.75rem 1rem; border-bottom: 1px solid #f1f5f9; vertical-align: top; }
    .markdown-content tr:nth-child(even) { background-color: #fcfcfd; }
    .markdown-content tr:hover { background-color: #f1f5f9; }
  </style>
  <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>
<body>
  <header class="full-width-header shadow-xl">
    <div class="w-full max-w-[1600px] mx-auto px-8 py-6">
      <div class="flex items-center justify-between flex-wrap gap-8">
        <div class="flex-1">
          <h1 class="text-2xl font-bold text-white tracking-tight">
            <a href="/" class="hover:text-blue-400 transition-colors">SAMRAT KAR</a>
          </h1>
          <p class="mt-1 text-slate-400 text-xs font-medium uppercase tracking-widest">{{ site.description }}</p>
        </div>
        <nav class="flex gap-2">
          <a href="/" class="nav-link">PORTFOLIO</a>
          <a href="/about/" class="nav-link">ABOUT</a>
          <a href="/books/" class="nav-link">BOOKS</a>
        </nav>
      </div>
    </div>
  </header>
  <main class="w-full max-w-[1600px] mx-auto px-8 py-10">
    <article class="markdown-content bg-white p-10 rounded-xl shadow-sm border border-slate-200">
      {{ content }}
    </article>
  </main>
  <footer class="w-full max-w-[1600px] mx-auto px-8 py-12 text-center text-slate-400 text-xs font-medium border-t border-slate-100 uppercase tracking-widest">
    &copy; {{ "now" | date: "%Y" }} {{ site.github_username }} &middot; EXPLORING & EXPERIMENTING
  </footer>
</body>
</html>
